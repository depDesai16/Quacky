name: Windows Package

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package-windows:
    name: Build Windows App And Installer
    runs-on: windows-latest
    env:
      GEMINI_API_KEY: ci-placeholder-key
      GOOGLE_API_KEY: ci-placeholder-key
      QUACKY_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-packaging.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-packaging.txt

      - name: Build Windows package
        run: python scripts/build_release.py --clean

      - name: Build Windows installer
        shell: pwsh
        env:
          QUACKY_SOURCE_DIR: ${{ github.workspace }}\dist\Quacky
        run: |
          choco install innosetup --no-progress -y
          iscc packaging\windows\Quacky.iss

      - name: Archive packaged app directory
        shell: pwsh
        run: Compress-Archive -Path dist/Quacky/* -DestinationPath dist/Quacky-$env:QUACKY_VERSION-windows.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quacky-windows-${{ env.QUACKY_VERSION }}
          path: |
            dist/Quacky-*.zip
            dist/installer/*.exe
          if-no-files-found: error
