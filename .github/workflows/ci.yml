name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ci-placeholder-key
      GOOGLE_API_KEY: ci-placeholder-key
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile source tree
        run: python -m compileall backend frontend tests scripts

      - name: Run Ruff
        run: python -m ruff check scripts tests backend/client.py backend/config.py backend/server.py backend/core backend/features/timers

      - name: Run test suite
        run: python -m pytest -q
