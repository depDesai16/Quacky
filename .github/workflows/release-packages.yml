name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows
          - os: macos-latest
            artifact_name: macos
          - os: ubuntu-latest
            artifact_name: linux
    env:
      GEMINI_API_KEY: ci-placeholder-key
      GOOGLE_API_KEY: ci-placeholder-key
      QUACKY_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.run_number) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-packaging.txt

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-packaging.txt

      - name: Build desktop packages
        run: python scripts/build_release.py --clean

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          QUACKY_SOURCE_DIR: ${{ github.workspace }}\dist\Quacky
        run: |
          choco install innosetup --no-progress -y
          iscc packaging\windows\Quacky.iss

      - name: Archive Linux package
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf Quacky-${QUACKY_VERSION}-linux.tar.gz Quacky

      - name: Archive macOS package
        if: runner.os == 'macOS'
        run: |
          cd dist
          tar -czf Quacky-${QUACKY_VERSION}-macos.tar.gz Quacky

      - name: Archive Windows package directory
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/Quacky/* -DestinationPath dist/Quacky-$env:QUACKY_VERSION-windows.zip

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quacky-${{ matrix.artifact_name }}-${{ env.QUACKY_VERSION }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/installer/*.exe
          if-no-files-found: error
